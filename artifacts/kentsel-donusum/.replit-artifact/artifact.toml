kind = "web"
previewPath = "/"
title = "Kentsel Dönüşüm Rehberi"
version = "1.0.0"
id = "artifacts/kentsel-donusum"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20955

[services.development]
run = "pnpm --filter @workspace/kentsel-donusum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kentsel-donusum", "run", "build" ]
publicDir = "artifacts/kentsel-donusum/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20955"
BASE_PATH = "/"
